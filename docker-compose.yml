services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mini_teramind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mini_teramind}
      POSTGRES_DB: ${POSTGRES_DB:-mini_teramind}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mini_teramind}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
